<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contagem regressiva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>

  :root{
    --bg-deep:     #0F0420;
    --bg-purple:   #2B0F73;
    --bg-purple-2: #4B1FA8;
    --glow:        #7C3AED;
    --white:       #FFFFFF;
    --lilac:       #B6A4E8;
    --lilac-dim:   #9D89D6;
    --card-bg:     rgba(124, 58, 237, 0.16);
    --card-border: rgba(180, 150, 255, 0.25);
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  html, body{
    background: var(--bg-deep);
    color: var(--white);
    font-family: 'Manrope', 'Helvetica Neue', Arial, sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  body{
    background:
      radial-gradient(ellipse 70% 45% at 50% 18%, rgba(124,58,237,0.55), transparent 65%),
      radial-gradient(ellipse 90% 60% at 50% 100%, rgba(75,15,140,0.5), transparent 60%),
      linear-gradient(180deg, #1B0540 0%, #0F0420 55%, #0A0218 100%);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content: center;
    height: 100vh;
    padding: 2vh 0;
  }

  @media (max-width: 600px){
    html, body{
      height: auto;
      min-height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
    }
    body{
      justify-content: flex-start;
      padding: 24px 0;
    }
  }

  /* ---------- HERO ---------- */

  .hero{
    position:relative;
    width:100%;
    max-width: min(760px, 50vh);
    margin-top: 0;
    padding: 0 32px;
    perspective: 1400px;
    display:flex;
    justify-content:center;
    flex-shrink: 0;
  }

  @media (max-width: 600px){
    .hero{
      max-width: 500px;
      margin-top: 8px;
    }
  }

  .hero-glow{
    position:absolute;
    top: 8%;
    left: 50%;
    width: 78%;
    aspect-ratio: 1/1;
    transform: translateX(-50%);
    background: radial-gradient(circle, rgba(160,110,255,0.55), rgba(124,58,237,0.25) 45%, transparent 72%);
    filter: blur(28px);
    z-index: 0;
    pointer-events:none;
  }

  .cloth-reveal{
    position: relative;
    width: 100%;
    transform-style: preserve-3d;
  }

  .cloth-wrap{
    position:relative;
    width:100%;
    z-index: 1;
    transform-style: preserve-3d;
    will-change: transform;
  }

  .cloth-wrap img{
    width:100%;
    display:block;
    filter: drop-shadow(0 30px 50px rgba(0,0,0,0.55));
    will-change: transform;
    position: relative;
  }

  /* camada de luz que reage ao mouse, simulando reflexo sobre as dobras do tecido */
  .cloth-light{
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease-out;
    background: radial-gradient(
      circle 280px at 50% 50%,
      rgba(255,255,255,1) 0%,
      rgba(230,210,255,0.7) 30%,
      rgba(160,110,255,0.25) 55%,
      transparent 78%
    );
    mix-blend-mode: overlay;
    /* usa a própria imagem como máscara, restringindo a luz à silhueta do pano */
    -webkit-mask-image: var(--cloth-mask);
    mask-image: var(--cloth-mask);
    -webkit-mask-size: 100% 100%;
    mask-size: 100% 100%;
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
  }

  .cloth-light.is-active{
    opacity: 1;
  }

  /* ---------- TITLE ---------- */

  .title{
    text-align:center;
    margin-top: 2.2vh;
    padding: 0 20px;
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: clamp(22px, 4.2vh, 48px);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #FFFFFF;
    line-height: 1.3;
    max-width: 1100px;
    text-shadow: 0 0 12px rgba(255,255,255,0.12);
    flex-shrink: 0;
    position: relative;
    cursor: default;
  }

  /* camada de brilho que segue o cursor, recortada na forma das letras */
  .title-glow{
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(
      circle 160px at var(--gx, 50%) var(--gy, 50%),
      rgba(255,255,255,1) 0%,
      rgba(220,190,255,0.95) 40%,
      transparent 75%
    );
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    opacity: 0;
    transition: opacity 0.35s ease-out;
    filter: blur(6px) brightness(2.2);
  }

  .title:hover .title-glow{
    opacity: 1;
  }

  .subtitle{
    text-align:center;
    margin-top: 0.8vh;
    padding: 0 24px;
    font-family: 'Manrope', sans-serif;
    font-weight: 500;
    font-size: clamp(15px, 2.6vh, 30px);
    color: #B987FF;
    letter-spacing: 0.02em;
    flex-shrink: 0;
  }

  @media (max-width: 600px){
    .title{
      font-size: 30px;
      letter-spacing: 0.12em;
      margin-top: 28px;
    }
    .subtitle{
      font-size: 19px;
      margin-top: 10px;
    }
  }

  /* ---------- COUNTDOWN ---------- */

  .countdown{
    display:flex;
    justify-content:center;
    align-items:stretch;
    gap: clamp(8px, 2vw, 16px);
    margin-top: 2.6vh;
    padding: 0 16px;
    flex-wrap: nowrap;
    flex-shrink: 0;
  }

  .unit-card{
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: clamp(10px, 2.2vh, 22px) clamp(12px, 3.4vw, 26px);
    display:flex;
    flex-direction:column;
    align-items:center;
    min-width: 70px;
    backdrop-filter: blur(6px);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.08),
      0 8px 24px rgba(75,15,140,0.35);
  }

  .unit-number{
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: clamp(28px, min(7vh, 11vw), 82px);
    line-height: 1;
    color: #FFFFFF;
    font-variant-numeric: tabular-nums;
  }

  .unit-label{
    margin-top: 0.8vh;
    font-family: 'Manrope', sans-serif;
    font-weight: 600;
    font-size: clamp(9px, 1.3vh, 15px);
    letter-spacing: 0.30em;
    text-transform: uppercase;
    color: #B987FF;
  }

  .colon{
    align-self: center;
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: clamp(20px, 4vh, 44px);
    color: var(--lilac);
    opacity: 0.6;
  }

  @media (max-width: 600px){
    .unit-card{ padding: 12px 10px; }
    .unit-number{ font-size: 9.5vw; }
    .unit-label{
      margin-top: 6px;
      font-size: 10px;
      letter-spacing: 0.18em;
    }
    .colon{ font-size: 28px; }
    .progress-wrap{ margin-top: 28px; }
    .date-line{
      margin-top: 14px;
      font-size: 15px;
    }
  }

  /* ---------- DIVIDER + DATE ---------- */

  .divider{
    width: 64px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--glow), transparent);
    margin: clamp(28px, 5vw, 40px) auto 0;
    box-shadow: 0 0 12px rgba(160,110,255,0.7);
    display: none;
  }

  .date-line{
    margin-top: 1.6vh;
    margin-bottom: 0;
    display:flex;
    align-items:center;
    gap: 10px;
    font-family: 'Manrope', sans-serif;
    font-weight: 500;
    font-size: clamp(13px, 2.1vh, 24px);
    color: rgba(255,255,255,0.85);
    flex-shrink: 0;
  }

  .date-line svg{
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  .footer-logo{
    margin-top: 2.2vh;
    height: clamp(28px, 4.6vh, 48px);
    width: auto;
    opacity: 1;
    flex-shrink: 0;
  }

  @media (max-width: 600px){
    .footer-logo{
      margin-top: 18px;
      height: 34px;
    }
  }

  .ended-state{
    display:none;
    text-align:center;
    margin-top: clamp(32px, 6vw, 52px);
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: clamp(22px, 4vw, 32px);
    color: var(--white);
    text-shadow: 0 0 24px rgba(160,110,255,0.6);
  }

  /* ---------- PROGRESS BAR ---------- */

  .progress-wrap{
    width: 80%;
    max-width: 560px;
    margin: 2.2vh auto 0;
    display: flex;
    align-items: center;
    height: 24px;
    flex-shrink: 0;
  }

  .progress-track{
    position: relative;
    width: 100%;
    height: 6px;
    border-radius: 999px;
    background: rgba(80, 40, 140, 0.28);
    border: 1px solid rgba(190, 150, 255, 0.22);
    overflow: visible;
  }

  .progress-fill{
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 0%;
    border-radius: 999px;
    background: linear-gradient(90deg, #9B5CFF 0%, #C084FC 50%, #F0ABFC 100%);
    box-shadow:
      0 0 10px 1px rgba(192, 132, 252, 0.55),
      0 0 20px 3px rgba(155, 92, 255, 0.3);
    overflow: hidden;
  }

  /* intensificação luminosa na ponta — faixa interna, não um elemento separado */
  .progress-fill::after{
    content: "";
    position: absolute;
    right: 0;
    top: 0;
    width: 44px;
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(
      90deg,
      rgba(255,255,255,0) 0%,
      rgba(255,255,255,0.55) 55%,
      rgba(255,255,255,0.95) 100%
    );
    box-shadow:
      0 0 6px rgba(232,121,249,0.8),
      0 0 12px rgba(192,132,252,0.55);
    filter: blur(0.3px);
    animation: flarePulse 2.6s ease-in-out infinite;
    pointer-events: none;
  }

  /* shimmer contínuo percorrendo o preenchimento */
  .progress-fill::before{
    content:"";
    position:absolute;
    inset: 0;
    background: linear-gradient(
      100deg,
      transparent 20%,
      rgba(255,255,255,0.55) 50%,
      transparent 80%
    );
    background-size: 200% 100%;
    background-position: 200% 0;
    animation: shimmer 5s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes shimmer{
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  @keyframes flarePulse{
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.96; }
  }

  @media (max-width: 420px){
    .countdown{ gap: 6px; }
    .unit-card{ min-width: 58px; padding: 12px 10px; }
  }

  @media (prefers-reduced-motion: no-preference){
    .cloth-reveal{
      animation: reveal 1.3s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .title, .subtitle, .countdown, .progress-wrap, .date-line{
      animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    .title{ animation-delay: 0.22s; }
    .subtitle{ animation-delay: 0.34s; }
    .countdown{ animation-delay: 0.46s; }
    .progress-wrap{ animation-delay: 0.56s; }
    .date-line{ animation-delay: 0.66s; }
  }

  @keyframes reveal{
    from{ opacity:0; transform: translateY(20px) scale(0.97); }
    to{ opacity:1; transform: translateY(0) scale(1); }
  }
  @keyframes fadeUp{
    from{ opacity:0; transform: translateY(14px); }
    to{ opacity:1; transform: translateY(0); }
  }

</style>
</head>
<body>

  <div class="hero">
    <div class="hero-glow"></div>
    <div class="cloth-reveal">
      <div class="cloth-wrap" id="clothWrap" style="--cloth-mask: url('https://raw.githubusercontent.com/nathmenali/maccontagemregressiva/main/Pano%20surpresa%20transparente.png');">
        <img src="https://raw.githubusercontent.com/nathmenali/maccontagemregressiva/main/Pano%20surpresa%20transparente.png" alt="Pano de seda suspenso, em espera">
        <div class="cloth-light" id="clothLight"></div>
      </div>
    </div>
  </div>

  <h1 class="title" id="titleEl">
    Você vai querer ver isso.
    <span class="title-glow" aria-hidden="true">Você vai querer ver isso.</span>
  </h1>
  <p class="subtitle">Em breve.</p>

  <div class="countdown" id="countdown">
    <div class="unit-card">
      <div class="unit-number" id="days">00</div>
      <div class="unit-label">Dias</div>
    </div>
    <div class="colon">:</div>
    <div class="unit-card">
      <div class="unit-number" id="hours">00</div>
      <div class="unit-label">Horas</div>
    </div>
    <div class="colon">:</div>
    <div class="unit-card">
      <div class="unit-number" id="minutes">00</div>
      <div class="unit-label">Minutos</div>
    </div>
    <div class="colon">:</div>
    <div class="unit-card">
      <div class="unit-number" id="seconds">00</div>
      <div class="unit-label">Segundos</div>
    </div>
  </div>

  <div class="ended-state" id="ended">É hora.</div>

  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="divider"></div>
  <p class="date-line">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="3"></rect>
      <line x1="16" y1="2" x2="16" y2="6"></line>
      <line x1="8" y1="2" x2="8" y2="6"></line>
      <line x1="3" y1="10" x2="21" y2="10"></line>
    </svg>
    05 de agosto de 2026 &nbsp;&bull;&nbsp; 14h
  </p>

  <img src="https://raw.githubusercontent.com/nathmenali/maccontagemregressiva/main/MAC_H2.png" alt="Mackenzie Academia Corporativa" class="footer-logo">

<script>
  // Data final: 05/08/2026, 14h (horário local do navegador)
  const targetDate = new Date(2026, 7, 5, 14, 0, 0); // mês 7 = agosto (0-indexed)
  // Data de início da contagem, usada como referência para calcular o progresso da barra
  const startDate = new Date(2026, 5, 25, 0, 0, 0); // 25 de junho de 2026

  const daysEl = document.getElementById('days');
  const hoursEl = document.getElementById('hours');
  const minutesEl = document.getElementById('minutes');
  const secondsEl = document.getElementById('seconds');
  const countdownEl = document.getElementById('countdown');
  const endedEl = document.getElementById('ended');
  const progressFillEl = document.getElementById('progressFill');

  function pad(n){ return String(n).padStart(2, '0'); }

  function tick(){
    const now = new Date();
    const diff = targetDate - now;

    // progresso de 0 a 100% entre startDate e targetDate
    const totalSpan = targetDate - startDate;
    const elapsed = now - startDate;
    const progressPct = Math.min(100, Math.max(0, (elapsed / totalSpan) * 100));
    progressFillEl.style.width = progressPct + '%';

    if (diff <= 0){
      countdownEl.style.display = 'none';
      endedEl.style.display = 'block';
      clearInterval(timer);
      return;
    }

    const totalSeconds = Math.floor(diff / 1000);
    const days = Math.floor(totalSeconds / 86400);
    const hours = Math.floor((totalSeconds % 86400) / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;

    daysEl.textContent = pad(days);
    hoursEl.textContent = pad(hours);
    minutesEl.textContent = pad(minutes);
    secondsEl.textContent = pad(seconds);
  }

  tick();
  const timer = setInterval(tick, 1000);

  // ---------- Movimento do pano com o mouse ----------
  const clothWrap = document.getElementById('clothWrap');
  const clothLight = document.getElementById('clothLight');
  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  if (!prefersReducedMotion) {
    let targetRotX = 0, targetRotY = 0;
    let currentRotX = 0, currentRotY = 0;
    let targetLightX = 50, targetLightY = 50;
    let currentLightX = 50, currentLightY = 50;

    const maxTilt = 16; // graus de inclinação do pano

    function handleMove(clientX, clientY){
      const rect = clothWrap.getBoundingClientRect();
      const px = (clientX - rect.left) / rect.width;
      const py = (clientY - rect.top) / rect.height;

      const nx = px * 2 - 1; // -1..1
      const ny = py * 2 - 1;

      targetRotY = nx * maxTilt;
      targetRotX = -ny * maxTilt;

      // posição da luz acompanha o cursor diretamente (em %)
      targetLightX = px * 100;
      targetLightY = py * 100;

      clothLight.classList.add('is-active');
    }

    function resetMove(){
      targetRotX = 0;
      targetRotY = 0;
      clothLight.classList.remove('is-active');
    }

    clothWrap.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
    clothWrap.addEventListener('mouseleave', resetMove);

    clothWrap.addEventListener('touchmove', (e) => {
      const t = e.touches[0];
      if (t) handleMove(t.clientX, t.clientY);
    }, { passive: true });
    clothWrap.addEventListener('touchend', resetMove);

    function animate(){
      const ease = 0.12;
      currentRotX += (targetRotX - currentRotX) * ease;
      currentRotY += (targetRotY - currentRotY) * ease;
      currentLightX += (targetLightX - currentLightX) * 0.18;
      currentLightY += (targetLightY - currentLightY) * 0.18;

      clothWrap.style.transform = `rotateX(${currentRotX}deg) rotateY(${currentRotY}deg)`;
      clothLight.style.background = `radial-gradient(
        circle 280px at ${currentLightX}% ${currentLightY}%,
        rgba(255,255,255,1) 0%,
        rgba(230,210,255,0.7) 30%,
        rgba(160,110,255,0.25) 55%,
        transparent 78%
      )`;

      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  }

  // ---------- Glow local no título, seguindo o cursor ----------
  const titleEl = document.getElementById('titleEl');
  if (titleEl && !prefersReducedMotion) {
    titleEl.addEventListener('mousemove', (e) => {
      const rect = titleEl.getBoundingClientRect();
      const gx = ((e.clientX - rect.left) / rect.width) * 100;
      const gy = ((e.clientY - rect.top) / rect.height) * 100;
      titleEl.style.setProperty('--gx', gx + '%');
      titleEl.style.setProperty('--gy', gy + '%');
    });
  }
</script>

</body>
</html>
